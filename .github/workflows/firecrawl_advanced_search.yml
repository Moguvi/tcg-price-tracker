name: Firecrawl Advanced Search Weekly

on:
  schedule:
    # 14:00 UTC corresponde a 11:00 AM no horário de Brasília (BRT/UTC-3)
    # Rodar todos os domingos (0)
    - cron: '0 14 * * 0'
  workflow_dispatch: # Permite rodar manualmente no GitHub

jobs:
  advanced-search:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install Dependencies
        run: |
          npm install
        
      - name: Run Advanced Search
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: node firecrawl_search.js
